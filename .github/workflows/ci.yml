name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Install Playwright's Chromium into the workspace so the server's browser
      # discovery (config._discover_chromium globs PLAYWRIGHT_BROWSERS_PATH) finds
      # it, and the Node engines reuse the same binary.
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
      # The Node engines reuse the Playwright Chromium — never download their own.
      PUPPETEER_SKIP_DOWNLOAD: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Install Node engines (pa11y, Lighthouse, IBM)
        run: bash accessibility_mcp/engines_node/setup.sh

      - name: Run tests
        run: pytest -q
